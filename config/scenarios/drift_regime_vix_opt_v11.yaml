name: drift_regime_vix_optimization_v11
strategy: DriftRegimeConditionalFactorPortfolioStrategy

start_date: "2018-01-01"
end_date: "2023-01-31"
train_window_months: 36
test_window_months: 12

timing_config:
  mode: time_based
  rebalance_frequency: D

