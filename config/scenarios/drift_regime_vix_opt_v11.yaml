strategy_params:
  drift_window: 63
  drift_threshold: 0.60
  num_holdings: 10
  trade_shorts: false
  risk_off_signal_config:
    type: "VixSmaRiskOffSignalGenerator"
    vix_ticker: "^VIX"
    sma_window_days: 20
    threshold: 21.0

extras:
  is_wfo: false

optimize:
  - parameter: vix_threshold
    type: float
    min_value: 15.0
    max_value: 35.0
    step: 1.0
  - parameter: drift_threshold
    type: float
    min_value: 0.50
    max_value: 0.70
    step: 0.05
  - parameter: drift_window
    type: int
    min_value: 21
    max_value: 126
    step: 21

optimization_metric: "Calmar"

optimization_config:
  study_name: drift_vix_calmar_opt_v4
  optimize_objective: "Calmar"
  optimization_direction: maximize
  n_trials: 30
