name: drift_regime_conditional_factor_portfolio_strategy
strategy: DriftRegimeConditionalFactorPortfolioStrategy

rebalance_frequency: W
position_sizer: equal_weight
timing_config:
  mode: time_based
  rebalance_frequency: W
train_window_months: 60
test_window_months: 12
universe_config:
  type: method
  method_name: get_all_historical_russell_2000_components
optimization_metric: Sharpe
optimize:
- parameter: drift_threshold
  min_value: 0.5
  max_value: 0.8
  step: 0.05
- parameter: num_holdings
  min_value: 10
  max_value: 50
  step: 5
strategy_params:
  drift_window: 63
  drift_threshold: 0.6
  reversal_window: 10
  num_holdings: 30
  leverage: 1.0
  smoothing_lambda: 0.0
mc_simulations: 500
mc_years: 10
