# Dual Momentum (Lagged) - Residual Momentum + Vol Target (Portfolio Proxy)
#
# Combines a "cleaner" relative-momentum ranking (beta-adjusted / residual) with
# a portfolio-proxy volatility targeting overlay.

name: dual_momentum_lagged_portfolio_research_residual_portfolio_vol_target
strategy: DualMomentumLaggedPortfolioStrategy

position_sizer: equal_weight
rebalance_frequency: ME

timing_config:
  mode: time_based
  rebalance_frequency: ME

universe_config:
  type: method
  method_name: get_top_weight_sp500_components
  n_holdings: 20

benchmark_ticker: SPX

strategy_params:
  lookback_months: 12
  min_absolute_momentum: 0.0
  lag_months: 1
  max_holdings: 10

  use_200sma_filter: true
  sma_period: 200

  ranking_method: residual_momentum
  absolute_exit_buffer: 0.02
  relative_exit_buffer: 0.02

  vol_target_enabled: true
  vol_target_source: portfolio_proxy
  target_vol_annual: 0.22
  vol_lookback_days: 63
  vol_max_gross_exposure: 1.0

  panic_overlay_enabled: false

  trade_longs: true
  trade_shorts: false

