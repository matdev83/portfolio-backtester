# Dual Momentum (Lagged) - Optimize Default + Benchmark EMA Crossover Risk-Off
name: dual_momentum_lagged_portfolio_default_opt_roro_benchmark_ema
strategy: DualMomentumLaggedPortfolioStrategy

position_sizer: equal_weight
rebalance_frequency: ME

timing_config:
  mode: time_based
  rebalance_frequency: ME

universe_config:
  type: method
  method_name: get_top_weight_sp500_components
  n_holdings: 20

train_window_months: 60
test_window_months: 12
walk_forward_type: rolling
optimization_metric: Sortino

risk_off_signal_config:
  type: BenchmarkEmaCrossoverRiskOffSignalGenerator
  fast_ema_days: 50
  slow_ema_days: 200

strategy_params:
  lookback_months: 12
  lag_months: 1
  max_holdings: 10
  min_absolute_momentum: 0.0

  use_200sma_filter: false
  sma_period: 200

  ranking_method: residual_momentum
  absolute_exit_buffer: 0.02
  relative_exit_buffer: 0.02

  vol_target_enabled: true
  vol_target_source: portfolio_proxy
  target_vol_annual: 0.22
  vol_lookback_days: 63
  vol_max_gross_exposure: 1.0

  panic_overlay_enabled: false
  panic_drawdown_lookback_days: 126
  panic_drawdown_threshold: -0.12
  panic_vol_threshold: 0.25
  panic_exposure_multiplier: 0.25

  trade_longs: true
  trade_shorts: false

optimize:
  - parameter: lookback_months
    type: int
    min_value: 6
    max_value: 18
    step: 1

  - parameter: lag_months
    type: int
    min_value: 0
    max_value: 2
    step: 1

  - parameter: max_holdings
    type: int
    min_value: 5
    max_value: 20
    step: 5

  - parameter: min_absolute_momentum
    type: float
    min_value: -0.05
    max_value: 0.10
    step: 0.05

  - parameter: absolute_exit_buffer
    type: float
    min_value: 0.0
    max_value: 0.05
    step: 0.01

  - parameter: relative_exit_buffer
    type: float
    min_value: 0.0
    max_value: 0.05
    step: 0.01

  - parameter: target_vol_annual
    type: float
    min_value: 0.12
    max_value: 0.30
    step: 0.01

  - parameter: vol_lookback_days
    type: int
    min_value: 21
    max_value: 126
    step: 21

  - parameter: panic_overlay_enabled
    type: categorical
    choices: [true, false]

  - parameter: panic_drawdown_threshold
    type: float
    min_value: -0.25
    max_value: -0.08
    step: 0.01

  - parameter: panic_vol_threshold
    type: float
    min_value: 0.20
    max_value: 0.50
    step: 0.05

  - parameter: panic_exposure_multiplier
    type: float
    min_value: 0.10
    max_value: 0.75
    step: 0.05

