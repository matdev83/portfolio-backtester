# Dual Momentum (Lagged) — S&P 500 sector / broad-sector ETF sleeve vs SPY.
# Universe: 11 liquid sector proxies (Stooq/MDMP canonical AMEX ids).
# Baseline params aligned with country_etf_universe_spy_benchmark_no_sma_lag0 (simple
# long-only sleeve, no 200SMA gate, no vol targeting) for a first-pass smoke backtest.

name: dual_momentum_lagged_portfolio_dual_momentum_sp500_sectors_spy
strategy: DualMomentumLaggedPortfolioStrategy

position_sizer: equal_weight
rebalance_frequency: ME

timing_config:
  mode: time_based
  rebalance_frequency: ME

universe_config:
  type: fixed
  tickers:
    - AMEX:XLB
    - AMEX:FDN
    - AMEX:XLE
    - AMEX:XLF
    - AMEX:XLI
    - AMEX:XLK
    - AMEX:XLP
    - AMEX:IYR
    - AMEX:XLU
    - AMEX:XLV
    - AMEX:XLY

benchmark_ticker: AMEX:SPY

train_window_months: 60
test_window_months: 12
walk_forward_type: rolling

optimization_metric: Sortino

strategy_params:
  lookback_months: 5
  lag_months: 0
  max_holdings: 5
  min_absolute_momentum: 0.05

  use_200sma_filter: false
  sma_period: 200

  ranking_method: excess_total_return
  absolute_exit_buffer: 0.02
  relative_exit_buffer: 0.01

  vol_target_enabled: false

  panic_overlay_enabled: false

  trade_longs: true
  trade_shorts: false
