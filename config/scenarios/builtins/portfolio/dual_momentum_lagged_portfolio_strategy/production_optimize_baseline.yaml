# Dual Momentum (Lagged) - Production WFO Optimization (Baseline)

name: dual_momentum_lagged_portfolio_prod_opt_baseline
strategy: DualMomentumLaggedPortfolioStrategy

position_sizer: equal_weight
rebalance_frequency: ME

timing_config:
  mode: time_based
  rebalance_frequency: ME

universe_config:
  type: method
  method_name: get_top_weight_sp500_components
  n_holdings: 20

# WFO settings (used by optimization engine)
train_window_months: 60
test_window_months: 12
walk_forward_type: rolling

optimization_metric: Sortino

strategy_params:
  lookback_months: 12
  lag_months: 1
  max_holdings: 10
  min_absolute_momentum: 0.0

  use_200sma_filter: true
  sma_period: 200

  # Keep new research overlays explicitly off for baseline comparison
  ranking_method: excess_total_return
  absolute_exit_buffer: 0.0
  relative_exit_buffer: 0.0
  vol_target_enabled: false
  panic_overlay_enabled: false

  trade_longs: true
  trade_shorts: false

optimize:
  - parameter: lookback_months
    type: int
    min_value: 6
    max_value: 18
    step: 1

  - parameter: lag_months
    type: int
    min_value: 0
    max_value: 2
    step: 1

  - parameter: max_holdings
    type: int
    min_value: 5
    max_value: 20
    step: 5

  - parameter: min_absolute_momentum
    type: float
    min_value: -0.05
    max_value: 0.10
    step: 0.05

  - parameter: use_200sma_filter
    type: categorical
    choices: [true, false]

  - parameter: sma_period
    type: int
    min_value: 150
    max_value: 250
    step: 25
