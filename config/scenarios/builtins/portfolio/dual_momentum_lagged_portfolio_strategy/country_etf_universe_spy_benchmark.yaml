# Dual Momentum (Lagged) — country/regional ETF sleeve vs SPY benchmark.
#
# Tradeable universe: exactly the tickers listed in config/symbol_definitions.json
# under `country_etf_dual_momentum_universe.symbols` (27 single-country/region ETFs).

name: dual_momentum_lagged_portfolio_country_etf_universe_spy_benchmark
strategy: DualMomentumLaggedPortfolioStrategy

position_sizer: equal_weight
rebalance_frequency: ME

timing_config:
  mode: time_based
  rebalance_frequency: ME

universe_config:
  type: fixed
  tickers:
    - ARGT
    - EWA
    - EWZ
    - EWC
    - ECH
    - FXI
    - EWQ
    - EWG
    - EWH
    - INDA
    - EIDO
    - EIS
    - EWI
    - EWJ
    - EWM
    - EWW
    - EPU
    - EPOL
    - KSA
    - EWS
    - EZA
    - EWY
    - EWL
    - EWT
    - TUR
    - EWU
    - VNM

benchmark_ticker: SPY

train_window_months: 60
test_window_months: 12
walk_forward_type: rolling

optimization_metric: Sortino

strategy_params:
  # Tuned dual-momentum defaults (same as country_etf_universe_spy_benchmark_no_sma_*);
  # this variant keeps SPY 200-day SMA RORO on.
  lookback_months: 6
  lag_months: 1
  max_holdings: 10
  min_absolute_momentum: 0.1

  use_200sma_filter: true
  sma_period: 200

  ranking_method: excess_total_return
  absolute_exit_buffer: 0.0
  relative_exit_buffer: 0.0

  vol_target_enabled: false

  panic_overlay_enabled: false

  trade_longs: true
  trade_shorts: false
