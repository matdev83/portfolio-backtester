# Dual Momentum (Lagged) - Vol Target (Portfolio Proxy, Higher Target Vol)
#
# Goal: keep the improved drawdown/Sharpe profile from portfolio-proxy vol targeting
# while reducing return drag by setting target vol closer to typical equity vol.

name: dual_momentum_lagged_portfolio_research_portfolio_vol_target_high_target
strategy: DualMomentumLaggedPortfolioStrategy

position_sizer: equal_weight
rebalance_frequency: ME

timing_config:
  mode: time_based
  rebalance_frequency: ME

universe_config:
  type: method
  method_name: get_top_weight_sp500_components
  n_holdings: 20

benchmark_ticker: SPX

strategy_params:
  lookback_months: 12
  min_absolute_momentum: 0.0
  lag_months: 1
  max_holdings: 10

  use_200sma_filter: true
  sma_period: 200

  ranking_method: excess_total_return
  absolute_exit_buffer: 0.02
  relative_exit_buffer: 0.02

  vol_target_enabled: true
  vol_target_source: portfolio_proxy
  target_vol_annual: 0.22
  vol_lookback_days: 63
  vol_max_gross_exposure: 1.0

  panic_overlay_enabled: false

  trade_longs: true
  trade_shorts: false

