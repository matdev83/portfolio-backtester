# Dual Momentum with Universe and Lag Strategy
# 
# A classical dual momentum strategy where:
# - Stocks must show positive absolute momentum (upside momentum)
# - Stocks must outperform the SPX benchmark (relative momentum)
# - Entries and exits are lagged by a configurable number of months
# - Uses TOP 50 S&P 500 companies as the universe

name: dual_momentum_lagged_portfolio
strategy: DualMomentumLaggedPortfolioStrategy

# Position sizing and timing
position_sizer: equal_weight
rebalance_frequency: ME

timing_config:
  mode: time_based
  rebalance_frequency: ME

# Universe: TOP 50 S&P 500 components (via MDMP)
universe_config:
  type: method
  method_name: get_top_weight_sp500_components
  n_holdings: 20

# Benchmark for relative momentum and RORO signal
# Note: In config/parameters.yaml, benchmark_ticker should be set or we can rely on data providing SPX
benchmark_ticker: SPX

# Strategy parameters
strategy_params:
  # Momentum calculation parameters
  lookback_months: 12
  min_absolute_momentum: 0.0  # Any positive momentum counts
  
  # Lag parameters (reduce whipsaws)
  lag_months: 1  # Wait 1 month before confirming entry
  
  # Portfolio construction
  max_holdings: 10  # Maximum stocks to hold
  
  # Risk management: 200-day SMA filter on SPX
  use_200sma_filter: true
  sma_period: 200
  
  # Trade direction
  trade_longs: true
  trade_shorts: false

# Optimization parameters
optimize:
  - parameter: lookback_months
    min_value: 3
    max_value: 24
    step: 1
    
  - parameter: lag_months
    min_value: 0
    max_value: 3
    step: 1
    
  - parameter: max_holdings
    min_value: 5
    max_value: 25
    step: 5
    
  - parameter: use_200sma_filter
    choices: [true, false]
    
  - parameter: position_sizer
    choices:
      - equal_weight
      - rolling_sharpe
      - rolling_sortino
      - rolling_downside_volatility
      
  - parameter: min_absolute_momentum
    min_value: -0.05
    max_value: 0.15
    step: 0.05
