# Dual Momentum with Universe and Lag Strategy - Dynamic Optimization
# 
# Uses the full historical S&P 500 universe (survivorship-bias free).

name: dual_momentum_dynamic_opt
strategy: DualMomentumLaggedPortfolioStrategy

position_sizer: equal_weight
rebalance_frequency: ME

timing_config:
  mode: time_based
  rebalance_frequency: ME

# Dynamic Universe: Top 50 S&P 500 components by weight (market-cap proxy).
# The backtester prefetches the union of Top-50 tickers over the run range.
universe_config:
  type: method
  method_name: get_top_weight_sp500_components
  n_holdings: 50
  exact: false

# Benchmark
benchmark_ticker: SPX
optimization_metric: Sortino

# Strategy parameters
strategy_params:
  lookback_months: 12
  min_absolute_momentum: 0.0
  lag_months: 1
  max_holdings: 10
  use_200sma_filter: true
  sma_period: 200
  trade_longs: true
  trade_shorts: false

# Optimization parameters
optimize:
  - parameter: lookback_months
    type: int
    min_value: 6
    max_value: 12
    step: 2
    
  - parameter: lag_months
    type: int
    min_value: 0
    max_value: 3
    step: 1
    
  - parameter: max_holdings
    type: int
    min_value: 5
    max_value: 20
    step: 5
    
  - parameter: use_200sma_filter
    type: categorical
    choices: [true, false]
    
  - parameter: min_absolute_momentum
    type: float
    min_value: -0.05
    max_value: 0.05
    step: 0.05
