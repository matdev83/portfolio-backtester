# Same universe as country_etf_universe_spy_benchmark.yaml but SPY 200-day SMA RORO off.
# ``strategy_params`` below match the WFO Optuna best from
# ``country_etf_universe_optimize_no_sma_lag0.yaml`` (seed 42, 150 trials, ``--early-stop-patience 0``).

name: dual_momentum_lagged_portfolio_country_etf_universe_spy_benchmark_no_sma_lag0
strategy: DualMomentumLaggedPortfolioStrategy

position_sizer: equal_weight
rebalance_frequency: ME

timing_config:
  mode: time_based
  rebalance_frequency: ME

universe_config:
  type: fixed
  tickers:
    - ARGT
    - EWA
    - EWZ
    - EWC
    - ECH
    - FXI
    - EWQ
    - EWG
    - EWH
    - INDA
    - EIDO
    - EIS
    - EWI
    - EWJ
    - EWM
    - EWW
    - EPU
    - EPOL
    - KSA
    - EWS
    - EZA
    - EWY
    - EWL
    - EWT
    - TUR
    - EWU
    - VNM

benchmark_ticker: SPY

train_window_months: 60
test_window_months: 12
walk_forward_type: rolling

optimization_metric: Sortino

strategy_params:
  lookback_months: 5
  lag_months: 0
  max_holdings: 10
  min_absolute_momentum: 0.05

  use_200sma_filter: false
  sma_period: 200

  ranking_method: excess_total_return
  absolute_exit_buffer: 0.02
  relative_exit_buffer: 0.01

  vol_target_enabled: false

  panic_overlay_enabled: false

  trade_longs: true
  trade_shorts: false
