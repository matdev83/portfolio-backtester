name: autogluon_sortino_ml_portfolio_strategy
strategy: AutogluonSortinoMlPortfolioStrategy

position_sizer: equal_weight
timing_config:
  mode: time_based
  rebalance_frequency: ME

min_universe_coverage: 1.0
train_window_months: 12
test_window_months: 6
wfo_step_months: 12
optimization_metric: Sortino
benchmark_ticker: AMEX:SPY

universe_config:
  type: fixed
  tickers:
    - AMEX:SPXL
    - AMEX:TZA
    - AMEX:TECL
    - AMEX:DIG
    - AMEX:FAS
    - AMEX:UDOW
    - AMEX:CURE
    - AMEX:DRN
    - AMEX:XLB
    - AMEX:SCHD
    - CBOE:ITA
    - AMEX:EEM
    - AMEX:UGL
    - AMEX:TMV
    - AMEX:TIP
    - AMEX:YCL
    - AMEX:YCS
    - CBOE:IEFA
    - AMEX:LABD

strategy_params:
  rebalance_frequency: ME
  feature_windows: [21, 42, 63, 126]
  correlation_window: 21
  label_lookback_days: 63
  label_horizons_days: [63]
  label_horizon_weights: [1.0]
  training_lookback_days: 756
  min_training_dates: 6
  min_label_observations: 63
  target_return: 0.0
  exposure_penalty: 0.0
  vol_target_enabled: true
  target_vol_annual: 0.15
  vol_lookback_days: 63
  vol_max_gross_exposure: 1.5
  price_column_asset: Close
  price_column_benchmark: Close
  autogluon_presets: medium_quality
  autogluon_time_limit_sec: 120
  autogluon_eval_metric: mean_squared_error
  autogluon_num_bag_folds: 0
  autogluon_num_stack_levels: 0
  autogluon_cache_models: true
  pretrain_models: true
  retrain_interval_years: 5
  trade_longs: true
  trade_shorts: false

optimize:
  - parameter: rebalance_frequency
    type: categorical
    values: [ME, BME]
