name: mmm_qs_swing_nasdaq_signal_default
strategy: MmmQsSwingNasdaqSignalStrategy

rebalance_frequency: D
position_sizer: equal_weight
benchmark_ticker: QQQ
timing_config:
  mode: signal_based
  scan_frequency: D
  min_holding_period: 1
train_window_months: 36
test_window_months: 12

universe_config:
  type: fixed
  tickers: [QQQ]

optimization_targets:
  - name: Sortino
    direction: maximize

optimize:
  - parameter: sl_atr_mult
    min_value: 0.8
    max_value: 3.0
    step: 0.05
  - parameter: tp_atr_mult
    min_value: 1.0
    max_value: 5.0
    step: 0.1
  - parameter: ibs_ratio
    min_value: 0.35
    max_value: 0.85
    step: 0.05
  - parameter: di_length
    min_value: 5
    max_value: 14
    step: 1
  - parameter: adx_smoothing
    min_value: 7
    max_value: 21
    step: 1
  - parameter: adx_threshold
    min_value: 15.0
    max_value: 35.0
    step: 1.0
  - parameter: atr_length
    min_value: 10
    max_value: 30
    step: 1
  - parameter: hlc3_avg_lookback
    min_value: 5
    max_value: 20
    step: 1
  - parameter: leverage
    min_value: 0.5
    max_value: 1.5
    step: 0.25

strategy_params:
  trade_longs: true
  trade_shorts: false
  leverage: 1.0
  ibs_ratio: 0.6
  sl_atr_mult: 1.18
  tp_atr_mult: 2.15
  di_length: 7
  adx_smoothing: 14
  adx_threshold: 20.0
  atr_length: 20
  hlc3_avg_lookback: 10
  trade_day_mon: true
  trade_day_tue: true
  trade_day_wed: false
  trade_day_thu: false
  trade_day_fri: false
  trade_month_01: true
  trade_month_02: false
  trade_month_03: true
  trade_month_04: true
  trade_month_05: true
  trade_month_06: true
  trade_month_07: true
  trade_month_08: true
  trade_month_09: false
  trade_month_10: true
  trade_month_11: true
  trade_month_12: true

mc_simulations: 100
mc_years: 5
