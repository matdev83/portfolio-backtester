name: mmm_qs_swing_optimize_sl_tp_sortino
strategy: MmmQsSwingNasdaqSignalStrategy

start_date: "2013-01-01"
end_date: "2025-06-30"

rebalance_frequency: D
position_sizer: equal_weight
benchmark_ticker: QQQ
timing_config:
  mode: signal_based
  scan_frequency: D
  min_holding_period: 1
  trade_execution_timing: bar_close
train_window_months: 36
test_window_months: 12

universe_config:
  type: fixed
  tickers: [QQQ]

optimization_targets:
  - name: Sortino
    direction: maximize

# Single evaluation window over [start_date, end_date] (optimizer collapses WFO when false).
extras:
  is_wfo: false

optimize:
  - parameter: sl_atr_mult
    min_value: 0.5
    max_value: 4.5
    step: 0.01
  - parameter: tp_atr_mult
    min_value: 1.0
    max_value: 10.0
    step: 0.01

strategy_params:
  trade_longs: true
  trade_shorts: false
  leverage: 1.0
  ibs_ratio: 0.6
  sl_atr_mult: 0.69
  tp_atr_mult: 1.19
  di_length: 7
  adx_smoothing: 14
  adx_threshold: 20.0
  atr_length: 20
  hlc3_avg_lookback: 10
  drawdown_from_ath_min_pct: 0.0
  drawdown_from_ath_max_dist_from_min_dd_pct: 0.0
  trade_day_mon: true
  trade_day_tue: true
  trade_day_wed: false
  trade_day_thu: false
  trade_day_fri: false
  trade_month_01: true
  trade_month_02: false
  trade_month_03: true
  trade_month_04: true
  trade_month_05: true
  trade_month_06: true
  trade_month_07: true
  trade_month_08: true
  trade_month_09: false
  trade_month_10: true
  trade_month_11: true
  trade_month_12: true

mc_simulations: 100
mc_years: 5
