# Minimal scenario for CLI smoke / CI: single WFO architecture cell, small universe.
name: cli_research_smoke
strategy: SimpleMomentumPortfolioStrategy
start_date: "2018-01-01"
end_date: "2020-12-31"
train_window_months: 12
test_window_months: 6
wfo_step_months: 3
walk_forward_type: rolling
wfo_mode: reoptimize
position_sizer: equal_weight
rebalance_frequency: ME
timing_config:
  mode: time_based
  rebalance_frequency: ME
universe_config:
  type: fixed
  tickers: [AAPL, MSFT]
benchmark_ticker: SPY
optimization_metric: Sharpe
strategy_params:
  lookback_months: 6
  num_holdings: 2
  top_decile_fraction: 0.2
  smoothing_lambda: 0.5
  leverage: 1.0
  skip_months: 0
optimize:
  - parameter: num_holdings
    type: int
    min_value: 2
    max_value: 3
    step: 1
research_protocol:
  enabled: true
  type: double_oos_wfo
  global_train_period:
    start_date: "2018-01-01"
    end_date: "2019-06-30"
  unseen_test_period:
    start_date: "2019-07-01"
    end_date: "2020-06-30"
  wfo_window_grid:
    train_window_months: [12]
    test_window_months: [6]
    wfo_step_months: [3]
    walk_forward_type: [rolling]
  selection:
    top_n: 1
    metric: Sharpe
  final_unseen_mode: fixed_selected_params
  lock:
    enabled: true
    refuse_overwrite: false
  reporting:
    enabled: false
