name: dual_momentum_small_universe_opt
strategy: DualMomentumLaggedPortfolioStrategy

# Keep this intentionally small/fast for debugging/validation
start_date: "2018-01-01"
end_date: "2020-12-31"

position_sizer: equal_weight
rebalance_frequency: ME

timing_config:
  mode: time_based
  rebalance_frequency: ME

# Small fixed universe (10 symbols) to keep runtime manageable
universe_config:
  type: fixed
  tickers: [SPY, QQQ, IWM, EFA, EEM, GLD, TLT, LQD, HYG, SHY]

# This package uses GLOBAL_CONFIG.benchmark (SPY), but keep this here for clarity
benchmark_ticker: SPY
optimization_metric: Sortino

# Enable a single compact diagnostics line per run (no huge DEBUG logs)
feature_flags:
  pnl_sanity: true

strategy_params:
  lookback_months: 12
  min_absolute_momentum: 0.0
  lag_months: 1
  max_holdings: 5
  use_200sma_filter: true
  sma_period: 200
  trade_longs: true
  trade_shorts: false

optimize:
  - parameter: lookback_months
    type: int
    min_value: 6
    max_value: 12
    step: 2
  - parameter: lag_months
    type: int
    min_value: 0
    max_value: 3
    step: 1
  - parameter: max_holdings
    type: int
    min_value: 3
    max_value: 8
    step: 1
  - parameter: use_200sma_filter
    type: categorical
    choices: [true, false]
  - parameter: min_absolute_momentum
    type: float
    min_value: -0.05
    max_value: 0.05
    step: 0.05

